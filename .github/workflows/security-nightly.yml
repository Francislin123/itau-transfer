name: Security Nightly Scan

on:
  schedule:
    - cron: "40 1 * * *" # 22:40 Brasil (BRT)
  workflow_dispatch:

jobs:
  owasp-scan:
    name: OWASP Dependency Check (Nightly)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🔥 CACHE OTIMIZADO (ESSENCIAL)
      - name: Cache OWASP Data
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: ${{ runner.os }}-owasp-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-owasp-

      # 🔐 EXECUÇÃO COM RETRY (ANTI 429)
      - name: Run OWASP Dependency Check
        run: |
          echo "Running OWASP scan..."
          mvn -B dependency-check:check || \
          (echo "Retrying OWASP..." && sleep 10 && mvn -B dependency-check:check)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      # 📄 PUBLICA RELATÓRIO
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: target/dependency-check-report.html

      # 🚨 FALHA VISÍVEL (MAS ISOLADA)
      - name: Fail if vulnerabilities found
        if: failure()
        run: |
          echo "Vulnerabilities found! Check the report."
          exit 1