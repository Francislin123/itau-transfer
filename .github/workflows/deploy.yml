name: DevSecOps Pipeline (AWS ECS Blue/Green)

on:
  push:
    branches: ["master"]

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: itau-transfer
  CLUSTER: itau-transfer-cluster
  GREEN_SERVICE: itau-transfer-service-green
  BLUE_SERVICE: itau-transfer-service

jobs:

  security:
    name: Security Scans (DevSecOps Gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔍 SAST - CodeQL (GitHub native)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # 🔍 Dependency Scan (Maven)
      - name: Dependency Check
        run: mvn org.owasp:dependency-check-maven:check

      # 🔍 Docker build for scan
      - name: Build Docker (for scan)
        run: docker build -t scan-image .

      # 🔍 Container Scan (Trivy)
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scan-image'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t $ECR_REPOSITORY:${GITHUB_SHA} .

      - name: Tag Image
        run: |
          docker tag $ECR_REPOSITORY:${GITHUB_SHA} \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${GITHUB_SHA}

      - name: Push Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${GITHUB_SHA}

  deploy:
    name: Blue/Green + Canary Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔍 Detect active environment
      - name: Detect active environment
        run: |
          CURRENT=$(aws elbv2 describe-listeners \
            --listener-arn "${{ secrets.LISTENER_ARN }}" \
            --query "Listeners[0].DefaultActions[0].ForwardConfig.TargetGroups[?Weight==\`100\`].TargetGroupArn" \
            --output text)

          echo "ACTIVE=$CURRENT" >> $GITHUB_ENV

          if [ "$CURRENT" == "${{ secrets.BLUE_TG_ARN }}" ]; then
            echo "DEPLOY=green" >> $GITHUB_ENV
            echo "SERVICE=${{ env.GREEN_SERVICE }}" >> $GITHUB_ENV
          else
            echo "DEPLOY=blue" >> $GITHUB_ENV
            echo "SERVICE=${{ env.BLUE_SERVICE }}" >> $GITHUB_ENV
          fi

      # 🚀 Deploy ECS
      - name: Deploy Service
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment

      - name: Wait Stable
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services $SERVICE

      # 🔥 Canary 10%
      - name: Canary Deploy
        run: |
          if [ "$DEPLOY" == "green" ]; then
            BLUE=90
            GREEN=10
          else
            BLUE=10
            GREEN=90
          fi

          aws elbv2 modify-listener \
            --listener-arn "${{ secrets.LISTENER_ARN }}" \
            --default-actions "[
              {
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {\"TargetGroupArn\": \"${{ secrets.BLUE_TG_ARN }}\", \"Weight\": $BLUE},
                    {\"TargetGroupArn\": \"${{ secrets.GREEN_TG_ARN }}\", \"Weight\": $GREEN}
                  ]
                }
              }
            ]"

      # 🧪 Health Check (gate)
      - name: Health Check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.HEALTH_URL }}")
            echo "Status: $STATUS"

            if [ "$STATUS" == "200" ]; then
              exit 0
            fi

            sleep 10
          done

          exit 1

      # 🔴 Rollback automático
      - name: Rollback
        if: failure()
        run: |
          echo "Rollback triggered"

          aws elbv2 modify-listener \
            --listener-arn "${{ secrets.LISTENER_ARN }}" \
            --default-actions "[
              {
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {\"TargetGroupArn\": \"${{ secrets.BLUE_TG_ARN }}\", \"Weight\": 100},
                    {\"TargetGroupArn\": \"${{ secrets.GREEN_TG_ARN }}\", \"Weight\": 0}
                  ]
                }
              }
            ]"

          echo "Rollback concluído"