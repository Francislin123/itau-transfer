name: DevSecOps Pipeline (AWS ECS Blue/Green)

on:
  push:
    branches: ["master"]

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: itau-transfer
  CLUSTER: itau-transfer-cluster
  GREEN_SERVICE: itau-transfer-service-green
  BLUE_SERVICE: itau-transfer-service

jobs:

  security:
    name: Security Scans (DevSecOps Gate)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ☕ Java setup
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 📦 CACHE (resolve lentidão do Dependency Check)
      - name: Cache OWASP DB
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: dependency-check-${{ runner.os }}

      # 🔍 CodeQL INIT
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      # 🔥 BUILD OBRIGATÓRIO PARA CODEQL
      - name: Build project (CodeQL requirement)
        run: mvn clean compile

      # 🔍 CodeQL ANALYZE
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # 🔍 Dependency Check (OTIMIZADO)
      - name: Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -Dnvd.api.key=${{ secrets.NVD_API_KEY }} \
            -Dformat=HTML \
            -DfailBuildOnCVSS=7

      # 🔍 Docker scan build
      - name: Build Docker (scan)
        run: docker build -t scan-image .

      # 🔍 Trivy scan
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scan-image'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t $ECR_REPOSITORY:${GITHUB_SHA} .

      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:${GITHUB_SHA} \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${GITHUB_SHA}

      - name: Push image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${GITHUB_SHA}

  deploy:
    name: Blue/Green + Canary + Rollback
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔍 Detect active environment
      - name: Detect active environment
        run: |
          CURRENT=$(aws elbv2 describe-listeners \
            --listener-arn "${{ secrets.LISTENER_ARN }}" \
            --query "Listeners[0].DefaultActions[0].ForwardConfig.TargetGroups[?Weight==\`100\`].TargetGroupArn" \
            --output text)

          echo "ACTIVE=$CURRENT"

          if [ "$CURRENT" == "${{ secrets.BLUE_TG_ARN }}" ]; then
            echo "DEPLOY=green" >> $GITHUB_ENV
            echo "SERVICE=${{ env.GREEN_SERVICE }}" >> $GITHUB_ENV
          else
            echo "DEPLOY=blue" >> $GITHUB_ENV
            echo "SERVICE=${{ env.BLUE_SERVICE }}" >> $GITHUB_ENV
          fi

      # 🚀 Deploy ECS
      - name: Deploy service
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment

      - name: Wait stabilization
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services $SERVICE

      # 🔥 Canary Deploy (50/50)
      - name: Canary Deploy
        run: |
          BLUE=50
          GREEN=50

          aws elbv2 modify-listener \
            --listener-arn "${{ secrets.LISTENER_ARN }}" \
            --default-actions "[
              {
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {\"TargetGroupArn\": \"${{ secrets.BLUE_TG_ARN }}\", \"Weight\": $BLUE},
                    {\"TargetGroupArn\": \"${{ secrets.GREEN_TG_ARN }}\", \"Weight\": $GREEN}
                  ]
                }
              }
            ]"

      # 🧪 Health Check (mais robusto)
      - name: Health Check
        run: |
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.HEALTH_URL }}")

            echo "Status: $STATUS"

            if [ "$STATUS" == "200" ]; then
              exit 0
            fi

            sleep 10
          done

          exit 1

      # 🔴 Rollback automático
      - name: Rollback
        if: failure()
        run: |
          echo "Rollback triggered"

          aws elbv2 modify-listener \
            --listener-arn "${{ secrets.LISTENER_ARN }}" \
            --default-actions "[
              {
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {\"TargetGroupArn\": \"${{ secrets.BLUE_TG_ARN }}\", \"Weight\": 100},
                    {\"TargetGroupArn\": \"${{ secrets.GREEN_TG_ARN }}\", \"Weight\": 0}
                  ]
                }
              }
            ]"

          echo "Rollback concluído"