name: Build, Deploy & Progressive Release

on:
  push:
    branches: ["master"]

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: itau-transfer
  CLUSTER: itau-transfer-cluster
  GREEN_SERVICE: itau-transfer-service-green
  BLUE_SERVICE: itau-transfer-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ☕ JAVA BUILD
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: mvn clean package -DskipTests

      # 🔐 AWS CREDENTIALS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔑 ECR LOGIN
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 🐳 BUILD IMAGE
      - name: Build Docker image
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:${GITHUB_SHA} .

      # 🏷 TAG IMAGE
      - name: Tag image
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:${GITHUB_SHA} \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${GITHUB_SHA}

      # 📦 PUSH IMAGE
      - name: Push image to ECR
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${GITHUB_SHA}

      # 🔍 DETECTA AMBIENTE ATIVO
      - name: Detect active environment
        run: |
          CURRENT=$(aws elbv2 describe-listeners \
            --listener-arn "${{ secrets.LISTENER_ARN }}" \
            --query "Listeners[0].DefaultActions[0].ForwardConfig.TargetGroups[?Weight==\`100\`].TargetGroupArn" \
            --output text)

          echo "ACTIVE_TG=$CURRENT" >> $GITHUB_ENV

          if [ "$CURRENT" == "${{ secrets.BLUE_TG_ARN }}" ]; then
            echo "DEPLOY_SERVICE=${{ env.GREEN_SERVICE }}" >> $GITHUB_ENV
            echo "DEPLOY_COLOR=green" >> $GITHUB_ENV
          else
            echo "DEPLOY_SERVICE=${{ env.BLUE_SERVICE }}" >> $GITHUB_ENV
            echo "DEPLOY_COLOR=blue" >> $GITHUB_ENV
          fi

      # 🚀 DEPLOY ECS
      - name: Deploy service
        run: |
          aws ecs update-service \
            --cluster "${{ env.CLUSTER }}" \
            --service "${{ env.DEPLOY_SERVICE }}" \
            --force-new-deployment

      - name: Wait stabilization
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.CLUSTER }}" \
            --services "${{ env.DEPLOY_SERVICE }}"

      # 🔥 CANARY 10%
      - name: Canary 10%
        run: |
          if [ "${DEPLOY_COLOR}" == "green" ]; then
            BLUE=90
            GREEN=10
          else
            BLUE=10
            GREEN=90
          fi

          aws elbv2 modify-listener \
            --listener-arn "${{ secrets.LISTENER_ARN }}" \
            --default-actions "[
              {
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {
                      \"TargetGroupArn\": \"${{ secrets.BLUE_TG_ARN }}\",
                      \"Weight\": $BLUE
                    },
                    {
                      \"TargetGroupArn\": \"${{ secrets.GREEN_TG_ARN }}\",
                      \"Weight\": $GREEN
                    }
                  ]
                }
              }
            ]"

      # ⏳ WAIT
      - name: Wait after 10%
        run: sleep 120

      # 🔥 CANARY 50%
      - name: Canary 50%
        run: |
          aws elbv2 modify-listener \
            --listener-arn "${{ secrets.LISTENER_ARN }}" \
            --default-actions "[
              {
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {
                      \"TargetGroupArn\": \"${{ secrets.BLUE_TG_ARN }}\",
                      \"Weight\": 50
                    },
                    {
                      \"TargetGroupArn\": \"${{ secrets.GREEN_TG_ARN }}\",
                      \"Weight\": 50
                    }
                  ]
                }
              }
            ]"

      # ⏳ WAIT
      - name: Wait after 50%
        run: sleep 120

      # 🚀 FULL TRAFFIC SWITCH
      - name: Full traffic switch
        run: |
          if [ "${DEPLOY_COLOR}" == "green" ]; then
            BLUE=0
            GREEN=100
          else
            BLUE=100
            GREEN=0
          fi

          aws elbv2 modify-listener \
            --listener-arn "${{ secrets.LISTENER_ARN }}" \
            --default-actions "[
              {
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {
                      \"TargetGroupArn\": \"${{ secrets.BLUE_TG_ARN }}\",
                      \"Weight\": $BLUE
                    },
                    {
                      \"TargetGroupArn\": \"${{ secrets.GREEN_TG_ARN }}\",
                      \"Weight\": $GREEN
                    }
                  ]
                }
              }
            ]"

      # 🧪 HEALTH CHECK (SECRET)
      - name: Health check
        run: |
          echo "Validando saúde..."

          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.HEALTH_URL }}")

            echo "Status: $STATUS"

            if [ "$STATUS" == "200" ]; then
              echo "OK"
              exit 0
            fi

            sleep 10
          done

          exit 1

      # 🔴 ROLLBACK AUTOMÁTICO
      - name: Rollback
        if: failure()
        run: |
          echo "Rollback iniciado..."

          if [ "${DEPLOY_COLOR}" == "green" ]; then
            BLUE=100
            GREEN=0
          else
            BLUE=0
            GREEN=100
          fi

          aws elbv2 modify-listener \
            --listener-arn "${{ secrets.LISTENER_ARN }}" \
            --default-actions "[
              {
                \"Type\": \"forward\",
                \"ForwardConfig\": {
                  \"TargetGroups\": [
                    {
                      \"TargetGroupArn\": \"${{ secrets.BLUE_TG_ARN }}\",
                      \"Weight\": $BLUE
                    },
                    {
                      \"TargetGroupArn\": \"${{ secrets.GREEN_TG_ARN }}\",
                      \"Weight\": $GREEN
                    }
                  ]
                }
              }
            ]"

          echo "Rollback concluído"