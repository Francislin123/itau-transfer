spring:
  application:
    name: transfer-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  datasource:
    url: ${DB_URL:jdbc:h2:mem:transfer}
    username: ${DB_USER:sa}
    password: ${DB_PASS:sa}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

server:
  port: 8080
  address: 0.0.0.0

management:
  server:
    port: 8080
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: INFO