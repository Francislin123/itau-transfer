spring:
  application:
    name: transfer-api

  main:
    lazy-initialization: true  # 🚀 reduz tempo de startup

server:
  port: 8080
  address: 0.0.0.0

management:
  server:
    port: 8080
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never  # 🚀 health check mais leve

logging:
  level:
    root: INFO
    org.hibernate: WARN
    org.springframework: WARN  # 🚀 reduz ruído e melhora performance