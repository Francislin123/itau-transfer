# 🔥 CANARY 10%
- name: Canary 10%
  run: |
    if [ "${DEPLOY_COLOR}" == "green" ]; then
      BLUE=90
      GREEN=10
    else
      BLUE=10
      GREEN=90
    fi

    aws elbv2 modify-listener \
      --listener-arn "${{ secrets.LISTENER_ARN }}" \
      --default-actions "[
        {
          \"Type\": \"forward\",
          \"ForwardConfig\": {
            \"TargetGroups\": [
              {
                \"TargetGroupArn\": \"${{ secrets.BLUE_TG_ARN }}\",
                \"Weight\": $BLUE
              },
              {
                \"TargetGroupArn\": \"${{ secrets.GREEN_TG_ARN }}\",
                \"Weight\": $GREEN
              }
            ]
          }
        }
      ]"

# 🧠 NOVO — HEALTH CHECK
- name: Health check (canary validation)
  id: health-check
  run: |
    echo "Validando saúde do serviço..."

    for i in {1..10}; do
      STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.HEALTH_URL }}")

      echo "Status: $STATUS"

      if [ "$STATUS" == "200" ]; then
        echo "Saúde OK ✅"
        exit 0
      fi

      echo "Tentativa $i falhou..."
      sleep 10
    done

    echo "Health check falhou ❌"
    exit 1

# 🔥 ROLLBACK AUTOMÁTICO
- name: Rollback automático
  if: failure()
  run: |
    echo "Iniciando rollback automático..."

    if [ "${DEPLOY_COLOR}" == "green" ]; then
      BLUE=100
      GREEN=0
    else
      BLUE=0
      GREEN=100
    fi

    aws elbv2 modify-listener \
      --listener-arn "${{ secrets.LISTENER_ARN }}" \
      --default-actions "[
        {
          \"Type\": \"forward\",
          \"ForwardConfig\": {
            \"TargetGroups\": [
              {
                \"TargetGroupArn\": \"${{ secrets.BLUE_TG_ARN }}\",
                \"Weight\": $BLUE
              },
              {
                \"TargetGroupArn\": \"${{ secrets.GREEN_TG_ARN }}\",
                \"Weight\": $GREEN
              }
            ]
          }
        }
      ]"

    echo "Rollback concluído ✅"