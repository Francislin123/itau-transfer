spring:
  application:
    name: transfer-api

  main:
    lazy-initialization: true  # 🚀 reduces startup time

  datasource:
    url: ${DB_URL:jdbc:h2:mem:transfer}
    username: ${DB_USER:sa}
    password: ${DB_PASS:sa}
    driver-class-name: org.h2.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      initialization-fail-timeout: 0  # 🚀 avoids startup delay

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false  # 🚀 avoids unnecessary overhead

server:
  port: 8090
  address: 0.0.0.0
  forward-headers-strategy: framework

management:
  server:
    port: 8090
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never  # 🚀 lightweight health check

logging:
  level:
    root: INFO
    org.hibernate: WARN
    org.springframework: WARN  # 🚀 reduces noise and improves performance

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    use-root-path: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

    instances:
      # 👤 Client Validation (fallbackValidateClient)
      clientService:
        baseConfig: default
        slidingWindowSize: 15

      # 💳 Account Integration (fallbackSearchAccount)
      accountService:
        baseConfig: default

      # 🏦 External Regulatory Notification (fallbackBacenNotification)
      bacenService:
        baseConfig: default
        slidingWindowSize: 20
        waitDurationInOpenState: 15000

      # ⚙️ Global Orchestration Layer (fallbackTransferOrchestration)
      transferOrchestrator:
        baseConfig: default
        waitDurationInOpenState: 20000

      # 🚀 Core Transfer Execution (fallbackTransferSend)
      transferSendService:
        baseConfig: default
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30000     # 30s wait to prevent duplicate processing during instability