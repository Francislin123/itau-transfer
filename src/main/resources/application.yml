spring:
  application:
    name: transfer-api

  main:
    lazy-initialization: true  # 🚀 reduz tempo de startup

  datasource:
    url: ${DB_URL:jdbc:h2:mem:transfer}
    username: ${DB_USER:sa}
    password: ${DB_PASS:sa}
    driver-class-name: org.h2.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      initialization-fail-timeout: 0  # 🚀 evita delay na subida

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false  # 🚀 evita overhead desnecessário

server:
  port: 8080
  address: 0.0.0.0
  forward-headers-strategy: framework

management:
  server:
    port: 8080
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never  # 🚀 health check mais leve

logging:
  level:
    root: INFO
    org.hibernate: WARN
    org.springframework: WARN  # 🚀 reduz ruído e melhora performance

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    use-root-path: true